<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sin conexión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            color: #212529;
            padding: 24px;
        }
        .card {
            text-align: center;
            max-width: 420px;
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }
        h1 { font-size: 1.4rem; margin: 0 0 12px; }
        p { color: #6c757d; margin: 0 0 16px; }
        button {
            background: #2874A6;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 18px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sin conexión</h1>
        <p>No se pudo conectar al servidor. Revisá tu internet y volvé a intentar.</p>
        <button onclick="location.reload()">Reintentar</button>
    </div>
</body>
</html>
