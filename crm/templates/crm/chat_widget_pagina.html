<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <link rel="stylesheet" href="/static/css/crm/chat_widget_pagina.css?v1.0">
</head>
<body>
    <div class="cwp-hero" style="background:linear-gradient(135deg,{{ color }},#0b2a4a);">
        <div class="cwp-card">
            <div class="cwp-emoji">🤖</div>
            <h1>{{ titulo }}</h1>
            <p>Conversa con nuestro asistente. Estamos aquí para ayudarte.</p>
            <button id="cwpAbrir" class="cwp-btn" style="background:{{ color }};">Iniciar conversación</button>
        </div>
    </div>

    <script src="/chat-widget/embed.js"
            data-embed-key="{{ embed_key }}"
            data-titulo="{{ titulo }}"
            data-color="{{ color }}"
            data-bienvenida="{{ bienvenida }}"
            data-abierto="true"></script>
    <script>
        document.getElementById('cwpAbrir').addEventListener('click', function(){
            if (window.VidaChat) window.VidaChat.abrir();
        });
    </script>
</body>
</html>
