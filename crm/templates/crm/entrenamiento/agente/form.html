<div class="row g-2">
    <input type="hidden" value="{{ filtro.pk }}" name="pk">
    <input type="hidden" name="action" value="{{ action }}"/>
    <!-- Campo hidden para los detalles JSON -->
    <input type="hidden" name="detalles_json" id="detalles_json" value="">

    {% for field in form %}
        {% if field.is_hidden %}
            {{ field }}
        {% else %}
            <div class="col-lg-{{ field.field.widget.attrs.col }}">
                <div class="mb-2">
                    <label class="form-label small mb-1" for="id_{{ field.name }}">{{ field.label }}</label>
                    {{ field }}
                    <div class="invalid-feedback" id="errorMessage{{ field.name }}"></div>
                    {% if field.help_text %}
                        <div class="text-primary">{{ field.help_text }}</div>
                    {% endif %}
                </div>
            </div>
        {% endif %}
    {% endfor %}
</div>

<div class="border-top my-3"></div>

<!-- Sección de Detalles -->
<div class="mb-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">Detalles del Agente</h6>
        <button type="button" class="btn btn-primary btn-sm" id="btnAgregarDetalle">
            <i class="fa fa-plus me-1"></i>Agregar Detalle
        </button>
    </div>

    <div id="contenedorDetalles">
        <!-- Los detalles se agregarán aquí dinámicamente -->
    </div>
</div>

<div class="border-top my-3"></div>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-danger btn-sm me-1" data-bs-dismiss="modal">
        <i class="fa fa-window-close me-1"></i>Cancelar
    </button>
    <button type="submit" class="btn btn-success btn-sm">
        <i class="fa fa-save me-1"></i>Guardar
    </button>
</div>

{{ form.media }}

{% include 'base_formulario_modal.html' %}

<script>
    // Use window properties to avoid redeclaration errors in modals
    window.contadorDetalles = window.contadorDetalles || 0;
    window.lista_items1 = window.lista_items1 || [];

    // Definir las opciones de tipo de dato de enlace
    window.TIPO_DATO_ENLACE_OPTIONS = [
        { value: 1, text: 'TEXT' },
        { value: 2, text: 'HTML' },
        { value: 3, text: 'JSON' },
        { value: 4, text: 'EXCEL' },
        { value: 5, text: 'CSV' }
    ];

    // Reset variables when modal opens
    function resetearVariables() {
        window.contadorDetalles = 0;
        window.lista_items1 = [];
    }

    // Datos existentes para edición (se mantienen constantes)
    window.DATOS_ORIGINALES = {
        detalles: {% if filtro and filtro.pk %}{{ detalles_existentes|safe }}{% else %}[]{% endif %},
        tieneFiltro: {% if filtro and filtro.pk %}true{% else %}false{% endif %}
    };

    function agregarDetalle(detalleExistente = null) {
    window.contadorDetalles++;
    const tipo = detalleExistente ? detalleExistente.tipo : 1;
    const enlace = detalleExistente ? detalleExistente.enlace : '';
    const tipoDatoEnlace = detalleExistente ? detalleExistente.tipo_dato_enlace : 1;
    const archivoUrl = detalleExistente ? detalleExistente.archivo_url : '';
    const descripcion = detalleExistente ? detalleExistente.descripcion || '' : '';
    const idReal = detalleExistente ? detalleExistente.id : null;

    // Generar opciones para tipo_dato_enlace
    let tipoDatoEnlaceOptions = '';
    window.TIPO_DATO_ENLACE_OPTIONS.forEach(option => {
        const selected = option.value == tipoDatoEnlace ? 'selected' : '';
        tipoDatoEnlaceOptions += `<option value="${option.value}" ${selected}>${option.text}</option>`;
    });

    const detalleHtml = `
        <div class="card mb-2" id="detalle${window.contadorDetalles}">
            <div class="card-body p-3">
                ${generarCampoDetalle(window.contadorDetalles, tipo, enlace, tipoDatoEnlace, archivoUrl, tipoDatoEnlaceOptions, descripcion)}
            </div>
            <input type="hidden" class="detalle-id-real" value="${idReal || ''}">
        </div>
    `;

    $('#contenedorDetalles').append(detalleHtml);
    actualizarDetallesJSON();
}

    function generarCampoDetalle(id, tipo, enlace, tipoDatoEnlace, archivoUrl, tipoDatoEnlaceOptions, descripcion = '') {
    if (tipo == 1) {
        return `
            <div class="row g-2">
                <div class="col-md-3">
                    <label class="form-label small mb-1">Tipo</label>
                    <select class="form-select detalle-tipo" data-detalle="${id}" onchange="cambiarTipoDetalle(${id})">
                        <option value="1" selected>Enlace</option>
                        <option value="2">Archivo</option>
                        <option value="3">Texto</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small mb-1">Tipo de dato retorna</label>
                    <select class="form-select detalle-tipo-dato-enlace" data-detalle="${id}" onchange="actualizarDetallesJSON()">
                        ${tipoDatoEnlaceOptions}
                    </select>
                </div>
                <div class="col-md-5">
                    <label class="form-label small mb-1">Enlace</label>
                    <input type="url" class="form-control detalle-enlace" data-detalle="${id}" value="${enlace}" placeholder="https://ejemplo.com" onchange="actualizarDetallesJSON()">
                </div>
                <div class="col-md-1">
                    <label class="form-label small mb-1 text-white">asdasd</label>
                    <button type="button" class="btn btn-danger btn-sm" onclick="eliminarDetalle(${id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="col-12">
                    <label class="form-label small mb-1">Descripción</label>
                    <textarea class="form-control detalle-descripcion" data-detalle="${id}" rows="2" onchange="actualizarDetallesJSON()">${descripcion || ''}</textarea>
                </div>
            </div>
        `;
    } else if (tipo == 2) {
        return `
            <div class="row g-2">
                <div class="col-md-3">
                    <label class="form-label small mb-1">Tipo</label>
                    <select class="form-select detalle-tipo" data-detalle="${id}" onchange="cambiarTipoDetalle(${id})">
                        <option value="1">Enlace</option>
                        <option value="2" selected>Archivo</option>
                        <option value="3">Texto</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label small mb-1">Archivo</label>
                    <input type="file" class="form-control detalle-archivo" data-detalle="${id}" name="detalle_archivo_${id}" onchange="actualizarDetallesJSON()">
                    ${archivoUrl ? `<small class="text-muted">Archivo actual: <a href="${archivoUrl}" target="_blank">Ver archivo</a></small>` : ''}
                </div>
                <div class="col-md-1">
                    <label class="form-label small mb-1 text-white">asdasdsa</label>
                    <button type="button" class="btn btn-danger btn-sm" onclick="eliminarDetalle(${id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="col-12">
                    <label class="form-label small mb-1">Descripción</label>
                    <textarea class="form-control detalle-descripcion" data-detalle="${id}" rows="2" onchange="actualizarDetallesJSON()">${descripcion || ''}</textarea>
                </div>
            </div>
        `;
    } else {
        return `
            <div class="row g-2">
                <div class="col-md-3">
                    <label class="form-label small mb-1">Tipo</label>
                    <select class="form-select detalle-tipo" data-detalle="${id}" onchange="cambiarTipoDetalle(${id})">
                        <option value="1">Enlace</option>
                        <option value="2">Archivo</option>
                        <option value="3" selected>Texto</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label small mb-1">Descripción</label>
                    <textarea class="form-control detalle-descripcion" data-detalle="${id}" rows="2" onchange="actualizarDetallesJSON()">${descripcion || ''}</textarea>
                </div>
                <div class="col-md-1">
                    <label class="form-label small mb-1 text-white">asdasda</label>
                    <button type="button" class="btn btn-danger btn-sm" onclick="eliminarDetalle(${id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        `;
    }
}

    function eliminarDetalle(id) {
        $(`#detalle${id}`).remove();
        actualizarDetallesJSON();
    }

    function cambiarTipoDetalle(id) {
    const tipo = $(`select[data-detalle="${id}"].detalle-tipo`).val();
    const $card = $(`#detalle${id}`);

    // Generar opciones para tipo_dato_enlace
    let tipoDatoEnlaceOptions = '';
    window.TIPO_DATO_ENLACE_OPTIONS.forEach(option => {
        const selected = option.value == 1 ? 'selected' : '';
        tipoDatoEnlaceOptions += `<option value="${option.value}" ${selected}>${option.text}</option>`;
    });

    let inputContenido = '';
    if (tipo === '1') {
        // ENLACE
        inputContenido = `
            <div class="col-md-6">
                <label class="form-label small mb-1">Enlace</label>
                <input type="url" class="form-control detalle-enlace" data-detalle="${id}" placeholder="https://ejemplo.com" onchange="actualizarDetallesJSON()">
            </div>
        `;
    } else if (tipo === '2') {
        // ARCHIVO con mismo ancho
        inputContenido = `
            <div class="col-md-9">
                <label class="form-label small mb-1">Archivo</label>
                <input type="file" class="form-control detalle-archivo" data-detalle="${id}" name="detalle_archivo_${id}" onchange="actualizarDetallesJSON()">
            </div>
        `;
    } else {
        // TEXTO
        inputContenido = '';
    }

    const nuevoContenido = `
    <div class="row g-2">
        <div class="col-md-3">
            <label class="form-label small mb-1">Tipo</label>
            <select class="form-select detalle-tipo" data-detalle="${id}" onchange="cambiarTipoDetalle(${id})">
                <option value="1" ${tipo === '1' ? 'selected' : ''}>Enlace</option>
                <option value="2" ${tipo === '2' ? 'selected' : ''}>Archivo</option>
                <option value="3" ${tipo === '3' ? 'selected' : ''}>Texto</option>
            </select>
        </div>

        ${tipo === '1' ? `
        <div class="col-md-3">
            <label class="form-label small mb-1">Tipo de dato retorna</label>
            <select class="form-select detalle-tipo-dato-enlace" data-detalle="${id}" onchange="actualizarDetallesJSON()">
                ${tipoDatoEnlaceOptions}
            </select>
        </div>` : ''}

        ${inputContenido}

        <div class="${tipo === '3' ? 'col-lg-9' : 'col-12'}">
            <label class="form-label small mb-1">Descripción</label>
            <textarea class="form-control detalle-descripcion" data-detalle="${id}" rows="2" onchange="actualizarDetallesJSON()"></textarea>
        </div>
    </div>
`;

    $card.find('.card-body').html(nuevoContenido);
    actualizarDetallesJSON();
}


    function actualizarDetallesJSON() {
    window.lista_items1 = [];

    $('#contenedorDetalles .card').each(function(index) {
        const $card = $(this);
        const detalleId = $card.attr('id').replace('detalle', '');
        const idReal = $card.find('.detalle-id-real').val();
        const $tipoSelect = $card.find('.detalle-tipo');
        const $descripcionTextarea = $card.find('.detalle-descripcion');
        const tipo = parseInt($tipoSelect.val());

        let detalleData = {
            id: idReal || null,
            id_frontend: detalleId,
            tipo: tipo,
            enlace: '',
            tipo_dato_enlace: 1,
            archivo_nombre: '',
            archivo_index: index,
            descripcion: $descripcionTextarea.val() || ''
        };

        if (tipo === 1) {
            const $enlaceInput = $card.find('.detalle-enlace');
            const $tipoDatoEnlaceSelect = $card.find('.detalle-tipo-dato-enlace');

            detalleData.enlace = $enlaceInput.val() || '';
            detalleData.tipo_dato_enlace = parseInt($tipoDatoEnlaceSelect.val()) || 1;
        } else if (tipo === 2) {
            const $archivoInput = $card.find('.detalle-archivo');
            if ($archivoInput.length > 0 && $archivoInput[0].files.length > 0) {
                detalleData.archivo_nombre = $archivoInput[0].files[0].name;
            }
            delete detalleData.tipo_dato_enlace;
        } else {
            delete detalleData.enlace;
            delete detalleData.archivo_nombre;
            delete detalleData.archivo_index;
            delete detalleData.tipo_dato_enlace;
        }

        window.lista_items1.push(detalleData);
    });

    const jsonString = JSON.stringify(window.lista_items1);
    $('#detalles_json').val(jsonString);
}

    function funcionAntesDeGuardar() {
        actualizarDetallesJSON();
        return true;
    }

    function inicializarEventos() {
        // Limpiar event listeners previos
        $('#btnAgregarDetalle').off('click');

        $('#btnAgregarDetalle').on('click', function() {
            agregarDetalle();
        });

        // Usar delegación de eventos para campos dinámicos
        $(document).off('change', '.detalle-enlace, .detalle-archivo, .detalle-tipo-dato-enlace');
        $(document).on('change', '.detalle-enlace, .detalle-archivo, .detalle-tipo-dato-enlace', function() {
            actualizarDetallesJSON();
        });

        $(document).off('change', '.detalle-tipo');
        $(document).on('change', '.detalle-tipo', function() {
            const detalleId = $(this).data('detalle');
            cambiarTipoDetalle(detalleId);
        });
    }

    function inicializarDetalles() {
        // Reset variables
        resetearVariables();

        // Limpiar contenedor
        $('#contenedorDetalles').empty();
        $('#detalles_json').val('[]');

        if (window.DATOS_ORIGINALES.tieneFiltro) {
            if (window.DATOS_ORIGINALES.detalles && Array.isArray(window.DATOS_ORIGINALES.detalles) && window.DATOS_ORIGINALES.detalles.length > 0) {
                $.each(window.DATOS_ORIGINALES.detalles, function(index, detalle) {
                    agregarDetalle(detalle);
                });
            } else {
                agregarDetalle();
            }
        }
    }

    // Inicialización con jQuery - usar $(document).ready() más robusto
    $(document).ready(function() {
        inicializarEventos();
        inicializarDetalles();
    });

    // Limpiar cuando se cierre el modal
    $(document).on('hidden.bs.modal', function(e) {
        if ($(e.target).find('#contenedorDetalles').length > 0) {
            resetearVariables();
            $('#contenedorDetalles').empty();
            $('#detalles_json').val('[]');
        }
    });

    // Reinicializar cuando se abra el modal
    $(document).on('shown.bs.modal', function(e) {
        if ($(e.target).find('#contenedorDetalles').length > 0) {
            inicializarEventos();
            inicializarDetalles();
        }
    });
</script>
