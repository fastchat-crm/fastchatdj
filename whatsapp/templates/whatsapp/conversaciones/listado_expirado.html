{% extends 'base.html' %}
{% block head %}
<style>
    /* ── Layout flexbox: anula el position:absolute del tema ── */
    .chat-box-right {
        display: flex !important;
        flex-direction: column;
        height: calc(100vh - 120px) !important;
        position: relative;
    }
    #chat-header { flex-shrink: 0; }
    .chat-box-right .chat-body {
        flex: 1 1 auto !important;
        height: auto !important;
        min-height: 0;
        overflow-y: auto;
    }
    .chat-box-right .chat-footer {
        position: static !important;
        flex-shrink: 0;
        width: 100% !important;
        background: #f0f2f5 !important;
        border-top: 1px solid #dde1e7;
        box-shadow: 0 -2px 8px rgba(0,0,0,.07);
        border-radius: 0 0 8px 8px;
        padding: 10px 14px !important;
    }

    .chat-body-left {
        {#height: calc(100vh - 520px) !important;#}
        overflow-y: auto;
    }
    .conversacion-item {
        cursor: pointer;
        transition: background .2s;
    }
    .conversacion-item:hover  { background-color: rgba(0,0,0,0.04); }
    .conversacion-item.active { background-color: rgba(13,110,253,.08); border-color: #0d6efd !important; }

    /* Chat background — finalizadas usa gris más apagado */
    #chat-messages {
        background-color: #ece5dd;
    }
    #chat-messages .simplebar-content { padding: 16px 0 !important; }

    .btn-xs {
        font-size: .75rem;
        padding: .2rem .55rem;
        border-radius: 20px;
        border: 1px solid #dee2e6;
        background: #fff;
        color: #6c757d;
        cursor: pointer;
    }
    .btn-xs:hover { background: #0d6efd; color: #fff; border-color: #0d6efd; }

    /* filtros colapsables */
    #filtros-panel { font-size: .83rem; }
    #filtros-panel .form-control,
    #filtros-panel .form-select { font-size: .8rem; }
</style>
{% endblock %}

{% block content %}
    <div class="row">
        <div class="col-12">
            <div class="chat-box-left">

                <!-- Selector de sesiones -->
                <div class="p-3 pb-1">
                    <select id="sesion-selector" class="form-select form-select-sm">
                        {% for sesion in sesiones %}
                            <option value="{{ sesion.id }}" {% if sesion_seleccionada.id == sesion.id %}selected{% endif %}>
                                {{ sesion.numero }} | {{ sesion.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Tabs -->
                <ul class="nav nav-tabs nav-justified" id="myTab" role="tablist">
                    <li class="nav-item">
                        <a href="/whatsapp/conversaciones/" class="nav-link py-2 bloqueo_pantalla">Abiertas</a>
                    </li>
                    <li class="nav-item">
                        <a href="javascript:void(0)" class="nav-link py-2 active">Finalizadas</a>
                    </li>
                </ul>

                <!-- Filtros colapsables -->
                <div class="px-3 pt-2">
                    <button class="btn btn-xs btn-light border w-100 mb-1 text-start" type="button"
                            data-bs-toggle="collapse" data-bs-target="#filtros-panel">
                        <i class="fa fa-filter me-1 text-secondary"></i> Filtrar
                        {% if fecha_desde or fecha_hasta or filtro_sentimiento %}
                            <span class="badge bg-primary ms-1">●</span>
                        {% endif %}
                    </button>
                    <div class="collapse {% if fecha_desde or fecha_hasta or filtro_sentimiento %}show{% endif %}" id="filtros-panel">
                        <div class="border rounded p-2 mb-2 bg-light">
                            <div class="mb-1">
                                <label class="text-muted mb-0" style="font-size:.72rem;">Desde</label>
                                <input type="date" id="filtro-fecha-desde" class="form-control form-control-sm"
                                       value="{{ fecha_desde }}">
                            </div>
                            <div class="mb-1">
                                <label class="text-muted mb-0" style="font-size:.72rem;">Hasta</label>
                                <input type="date" id="filtro-fecha-hasta" class="form-control form-control-sm"
                                       value="{{ fecha_hasta }}">
                            </div>
                            <div class="mb-1">
                                <label class="text-muted mb-0" style="font-size:.72rem;">Sentimiento</label>
                                <select id="filtro-sentimiento" class="form-select form-select-sm">
                                    <option value="">Todos</option>
                                    <option value="positivo" {% if filtro_sentimiento == 'positivo' %}selected{% endif %}>😊 Positivo</option>
                                    <option value="neutral"  {% if filtro_sentimiento == 'neutral'  %}selected{% endif %}>😐 Neutral</option>
                                    <option value="negativo" {% if filtro_sentimiento == 'negativo' %}selected{% endif %}>😟 Negativo</option>
                                </select>
                            </div>
                            <div class="d-flex gap-1">
                                <button class="btn btn-xs btn-primary flex-grow-1" id="btn-aplicar-filtros">
                                    <i class="fa fa-search me-1"></i>Aplicar
                                </button>
                                <button class="btn btn-xs btn-light border" id="btn-limpiar-filtros" title="Limpiar filtros">
                                    <i class="fa fa-times"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Búsqueda por contacto -->
                <div class="chat-search px-3 pb-2">
                    <div class="p-1 bg-light rounded rounded-pill">
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <button type="button" class="btn btn-link text-secondary"><i class="fa fa-search"></i></button>
                            </div>
                            <input type="search" id="search-conversacion" placeholder="Buscar contacto..."
                                   class="form-control border-0 bg-light" value="{{ criterio }}">
                        </div>
                    </div>
                </div>

                <div class="chat-body-left px-3" data-simplebar id="conversaciones-container">
                    <div class="col" id="lista-conversaciones" style="display:flex;flex-direction:column;"></div>
                </div>
            </div><!--end chat-box-left -->

            <div class="chat-box-right">
                <!-- Header -->
                <div class="p-3 d-flex justify-content-between align-items-center card-bg rounded" id="chat-header">
                    <a href="javascript:void(0);" class="d-flex align-self-center">
                        <div class="flex-shrink-0">
                            <img src="/static/assets/img/avatar.png" alt="user"
                                 class="rounded-circle thumb-lg" id="contacto-foto">
                        </div>
                        <div class="flex-grow-1 ms-2 align-self-center">
                            <h6 class="my-0 fw-medium text-dark fs-14" id="contacto-nombre">Selecciona una conversación</h6>
                            <p class="text-muted mb-0" id="contacto-numero"></p>
                            <p class="text-muted mb-0 d-none d-sm-block">
                                <span id="contacto-hashedId"></span>
                                <small id="conv-fechas" class="ms-2 text-muted" style="font-size:.75rem;display:none;"></small>
                            </p>
                        </div>
                    </a>
                    <div class="d-flex align-items-center gap-2">
                        <div class="btn-group d-none" id="ver-resumen-btn">
                            <a href="javascript:void(0)" class="btn btn-sm btn-default text-muted" id="ver-resumen"
                               title="Ver resumen de la conversación">
                                <i class="fa fa-file-alt me-1"></i>Resumen
                            </a>
                        </div>
                        <div class="btn-group d-none" id="reactivar-btn">
                            <a href="javascript:void(0)" class="btn btn-sm btn-success" id="marcar-reactivar"
                               title="Reactivar conversación">
                                <i class="fa fa-redo me-1"></i>Reactivar
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Mensajes -->
                <div class="chat-body" data-simplebar id="chat-messages">
                    <div class="chat-detail" id="mensajes-container">
                        <div class="text-center p-5">
                            <i class="fa fa-comments fa-4x text-muted mb-3"></i>
                            <p class="text-muted">Selecciona una conversación para ver los mensajes</p>
                        </div>
                    </div>
                </div>

                <!-- Footer vacío (finalizadas no tienen formulario de envío) -->
                <div class="chat-footer p-3 bg-light" id="chat-footer" style="display:none;"></div>
            </div><!--end chat-box-right -->
        </div>
    </div>

    {% csrf_token %}
    <!-- Modal resumen -->
    <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalNombre">Resumen de Conversación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body detalleProdModal"></div>
            </div>
        </div>
    </div>
{% endblock %}

{% block jscript %}
<script src="/static/js/reconnecting-websocket.min.js"></script>
<script>
$(document).ready(function() {
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    let chatSocket, sessionSocket;
    let conversacionActiva = null;
    let _cargandoMensajes = false;

    // ── Filtros activos ────────────────────────────────────────────────
    let _filtros = {
        sesion_id: $('#sesion-selector').val(),
        criterio:  '{{ criterio|escapejs }}',
        fecha_desde: '{{ fecha_desde|escapejs }}',
        fecha_hasta: '{{ fecha_hasta|escapejs }}',
        sentimiento: '{{ filtro_sentimiento|escapejs }}',
    };

    function _buildUrl(extra) {
        let url = '/whatsapp/conversaciones-finalizadas/?load_conversations=true';
        if (_filtros.sesion_id)   url += '&sesion_id='    + _filtros.sesion_id;
        if (_filtros.criterio)    url += '&criterio='     + encodeURIComponent(_filtros.criterio);
        if (_filtros.fecha_desde) url += '&fecha_desde='  + _filtros.fecha_desde;
        if (_filtros.fecha_hasta) url += '&fecha_hasta='  + _filtros.fecha_hasta;
        if (_filtros.sentimiento) url += '&sentimiento='  + _filtros.sentimiento;
        return url;
    }

    // ── WebSockets ─────────────────────────────────────────────────────
    function conectarWebSocket(id) {
        if (chatSocket) chatSocket.close();
        chatSocket = new ReconnectingWebSocket(
            `${wsProtocol}//${window.location.host}/ws/chat/${id}/`,
            null, {reconnectInterval: 1500}
        );
        chatSocket.onmessage = function(e) {
            const d = JSON.parse(e.data);
            if (d.type === 'new_message' || d.type === 'messages_update') {
                $('#mensajes-container').html(d.html);
                setTimeout(scrollToBottom, 800);
            }
        };
    }

    function sessionWebSocket(sid) {
        if (sessionSocket) sessionSocket.close();
        sessionSocket = new ReconnectingWebSocket(
            `${wsProtocol}//${window.location.host}/ws/sessionroom/${sid}/`,
            null, {reconnectInterval: 1500}
        );
        sessionSocket.onmessage = function(e) {
            const d = JSON.parse(e.data);
            if ((d.type === 'new_message' || d.type === 'messages_update') && d.html) {
                const el = $(`#lista-conversaciones div[data-id=${d.conversacion_id}]`);
                el.length ? el.replaceWith(d.html) : $('#lista-conversaciones').append(d.html);
            }
        };
        cargarConversaciones();
    }

    sessionWebSocket($('#sesion-selector').val());

    // ── Scroll ─────────────────────────────────────────────────────────
    function scrollToBottom() {
        const cw = document.getElementById('chat-messages')?.querySelector('.simplebar-content-wrapper');
        if (cw) cw.scrollTop = cw.scrollHeight;
    }

    // ── Sesión ─────────────────────────────────────────────────────────
    $('#sesion-selector').on('change', function() {
        _filtros.sesion_id = $(this).val();
        _resetChat();
        sessionWebSocket(_filtros.sesion_id);
    });

    function _resetChat() {
        _cargandoMensajes = false;
        $.unblockUI();
        if (chatSocket) { chatSocket.close(); chatSocket = null; }
        $('#mensajes-container').html('<div class="text-center p-5"><i class="fa fa-comments fa-4x text-muted mb-3"></i><p class="text-muted">Selecciona una conversación</p></div>');
        $('#reactivar-btn, #ver-resumen-btn, #chat-footer').addClass('d-none').hide();
        $('#contacto-nombre').text('Selecciona una conversación');
        $('#contacto-numero, #contacto-hashedId').text('');
        $('#conv-fechas').hide();
        conversacionActiva = null;
    }

    // ── Cargar conversaciones ──────────────────────────────────────────
    function cargarConversaciones() {
        $('#lista-conversaciones').html('<div class="text-center p-3"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 small text-muted">Cargando...</p></div>');
        $.ajax({
            url: _buildUrl(),
            type: 'GET',
            headers: {'X-Requested-With': 'XMLHttpRequest'},
            success: function(r) {
                $('#lista-conversaciones').html(r.html);
                if (!$('#lista-conversaciones .conversacion-item').length) {
                    $('#lista-conversaciones').html('<div class="p-3 text-center text-muted small">Sin resultados</div>');
                }
                if (conversacionActiva) {
                    $(`.conversacion-item[data-id="${conversacionActiva}"]`).addClass('active');
                }
            },
            error: function() {
                $('#lista-conversaciones').html('<div class="p-3 text-center text-danger small">Error al cargar</div>');
            }
        });
    }

    // ── Cargar mensajes (con blockUI + anti-doble-click) ───────────────
    function cargarMensajes(id) {
        if (_cargandoMensajes || id == conversacionActiva) return;
        _cargandoMensajes = true;
        conversacionActiva = id;
        pantallaespera();

        if (chatSocket) { chatSocket.close(); chatSocket = null; }
        $('#reactivar-btn, #ver-resumen-btn').addClass('d-none').hide();
        $('#mensajes-container').html('<div class="text-center p-3"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 small text-muted">Cargando mensajes...</p></div>');

        $.ajax({
            url: '/whatsapp/conversaciones-finalizadas/?action=ver_mensajes&pk=' + id,
            type: 'GET',
            success: function(r) {
                $.unblockUI();
                _cargandoMensajes = false;

                $('#mensajes-container').html(r.html);
                $('#contacto-nombre').text(r.contacto_nombre || r.contacto_numero);
                $('#contacto-numero').text(r.contacto_numero);
                $('#contacto-hashedId').text(r.hashed_id ? '#' + r.hashed_id : '');
                $('#contacto-foto').attr('src', r.contacto_foto || '/static/assets/img/avatar.png');

                if (r.fecha_inicio || r.fecha_fin) {
                    let txt = '';
                    if (r.fecha_inicio) txt += '📅 ' + r.fecha_inicio;
                    if (r.fecha_fin)    txt += ' → ' + r.fecha_fin;
                    $('#conv-fechas').text(txt).show();
                } else {
                    $('#conv-fechas').hide();
                }

                $('#marcar-reactivar, #ver-resumen').attr('data-id', id);
                r.estado_active ? $('#reactivar-btn').addClass('d-none').hide()
                                : $('#reactivar-btn').removeClass('d-none').show();
                $('#ver-resumen-btn').removeClass('d-none').show();

                setTimeout(scrollToBottom, 800);
                conectarWebSocket(r.conversacion_id);
            },
            error: function(xhr, s, err) {
                $.unblockUI();
                _cargandoMensajes = false;
                $('#mensajes-container').html(`<div class="p-3 text-center text-danger"><i class="fa fa-exclamation-circle me-1"></i>Error: ${err}</div>`);
            }
        });
    }

    // Click en conversación
    $(document).on('click', '.cargar-conversacion', function(e) {
        e.preventDefault();
        const id = $(this).data('id');
        if (_cargandoMensajes || id == conversacionActiva) return;
        $('.conversacion-item').removeClass('active');
        $(this).closest('.conversacion-item').addClass('active');
        cargarMensajes(id);
    });

    // ── Búsqueda por contacto ──────────────────────────────────────────
    const _buscar = debounceFunction(function(e) {
        _filtros.criterio = $(e.target).val();
        cargarConversaciones();
    }, 500);
    $('#search-conversacion').on('keyup search', _buscar);

    // ── Filtros de fecha/sentimiento ───────────────────────────────────
    $('#btn-aplicar-filtros').on('click', function() {
        _filtros.fecha_desde  = $('#filtro-fecha-desde').val();
        _filtros.fecha_hasta  = $('#filtro-fecha-hasta').val();
        _filtros.sentimiento  = $('#filtro-sentimiento').val();
        cargarConversaciones();
    });

    $('#btn-limpiar-filtros').on('click', function() {
        _filtros.fecha_desde = _filtros.fecha_hasta = _filtros.sentimiento = _filtros.criterio = '';
        $('#filtro-fecha-desde, #filtro-fecha-hasta').val('');
        $('#filtro-sentimiento').val('');
        $('#search-conversacion').val('');
        cargarConversaciones();
    });

    // ── Reactivar ──────────────────────────────────────────────────────
    $('#reactivar-btn').on('click', '#marcar-reactivar', function() {
        const id = $(this).data('id');
        if (!id) return;
        Swal.fire({
            title: '¿Reactivar esta conversación?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Sí, reactivar',
            cancelButtonText: 'Cancelar',
        }).then(result => {
            if (!result.isConfirmed) return;
            pantallaespera();
            $.post('{{ request.path }}', {action: 'marcar-reactivar', id, csrfmiddlewaretoken: $('[name=csrfmiddlewaretoken]').val()},
                function(data) {
                    $.unblockUI();
                    const d = data[0];
                    d.error ? alertaWarning(d.message) : (window.location.href = d.url);
                }, 'json');
        });
    });

    // ── Ver resumen ────────────────────────────────────────────────────
    $('#ver-resumen-btn').on('click', '#ver-resumen', function() {
        const id = $(this).data('id');
        if (!id) return;
        pantallaespera();
        $.ajax({
            url: '{{ request.path }}',
            data: {action: 'ver_resumen_conversacion', pk: id},
            success: function(data) {
                $.unblockUI();
                if (data.result) {
                    $('.detalleProdModal').html(data.data);
                    new bootstrap.Modal(document.getElementById('modalDetalle')).show();
                } else {
                    alertaWarning(data.message);
                }
            },
            error: function() { $.unblockUI(); alertaWarning('Error de conexión.'); },
            dataType: 'json'
        });
    });

    // Cargar conversación preseleccionada desde sesión
    {% if conversacion_selected %}
    cargarMensajes('{{ conversacion_selected.id }}');
    {% endif %}
});
</script>
{% endblock %}
