<div class="d-flex flex-row-reverse">
    <img src="{{ mensaje.conversacion.contacto.sesion.usuario.contacto_foto|default:'/static/assets/img/avatar.png' }}" alt="user" class="rounded-circle thumb-md">
    <div class="me-1 chat-box w-100 reverse">
        <div class="user-chat">
            <p class="">{{ mensaje.mensaje }}</p>
        </div>
        <div class="chat-time">{{ mensaje.fecha|date:"H:i" }}</div>
    </div>
</div>
