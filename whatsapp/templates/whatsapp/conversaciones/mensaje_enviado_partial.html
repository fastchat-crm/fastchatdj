<div class="msg-row msg-out d-flex flex-row-reverse align-items-end gap-2 mb-2">
    <img src="{{ mensaje.conversacion.sesion.usuario.get_foto_url|default:'/static/assets/img/avatar.png' }}"
         alt="yo" class="rounded-circle flex-shrink-0" style="width:32px;height:32px;object-fit:cover;">
    <div class="msg-bubble msg-bubble-out">
        {% if mensaje.mensaje %}
            <p class="mb-0">{{ mensaje.mensaje }}</p>
        {% endif %}
        {% if mensaje.archivo_url %}
            {% if mensaje.tipo == 'imagen' %}
                <a href="{{ mensaje.archivo_url }}" target="_blank">
                    <img src="{{ mensaje.archivo_url }}" alt="imagen"
                         class="img-fluid rounded mt-1" style="max-width:220px;max-height:220px;object-fit:cover;">
                </a>
            {% elif mensaje.tipo == 'audio' %}
                <audio controls class="mt-1" style="max-width:220px;">
                    <source src="{{ mensaje.archivo_url }}">
                </audio>
            {% elif mensaje.tipo == 'video' %}
                <video controls class="img-fluid rounded mt-1" style="max-width:220px;">
                    <source src="{{ mensaje.archivo_url }}" type="video/mp4">
                </video>
            {% else %}
                <a href="{{ mensaje.archivo_url }}" target="_blank"
                   class="btn btn-sm btn-light border mt-1">
                    <i class="fa fa-download me-1"></i>{{ mensaje.tipo|capfirst }}
                </a>
            {% endif %}
        {% endif %}
        <div class="msg-meta text-end">
            <span class="msg-time">{{ mensaje.fecha|date:"H:i" }}</span>
            <i class="fa fa-check-double ms-1 text-primary" style="font-size:.65rem;" title="Enviado"></i>
        </div>
    </div>
</div>
