{# Panel "Proximamente" — generico para canales no implementados todavia. #}
<h5 class="pane-title">Integración con {{ nombre }}</h5>
<div class="proxim-wrap">
  <div class="proxim-icon" style="color:{{ color }}; background:{{ color }}1a;">
    <i class="{{ icono }}"></i>
  </div>
  <h4 class="proxim-titulo">Próximamente disponible</h4>
  <p class="proxim-copy">
    La conexión con {{ nombre }} está en desarrollo. Te avisaremos cuando puedas activarla
    desde aquí. Mientras tanto, sigue atendiendo a tus clientes por WhatsApp.
  </p>
  <div class="pane-actions">
    <button type="button" class="conex-btn conex-btn-light" data-cerrar>Volver</button>
  </div>
</div>
