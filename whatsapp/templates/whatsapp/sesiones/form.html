{% extends 'base.html' %}
{% block head %}{% endblock %}

{% block content %}
<div class="container">
    <h3>{{ titulo }}</h3>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="action" value="{{ action }}">
        {% if action == 'change' %}
        <input type="hidden" name="pk" value="{{ pk }}">
        {% endif %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{{ ruta }}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}

{% block jscript %}{% endblock %}
