<div class="row g-2">
    <input type="hidden" name="pk" value="{{ card.id }}">
    <input type="hidden" name="action" value="editar_card">
    <input type="hidden" name="card_id" value="{{ card.id }}">

    <div class="col-lg-8">
        <label class="form-label small mb-1">Valor estimado</label>
        <input type="number" step="0.01" min="0" name="valor_estimado" class="form-control" value="{{ card.valor_estimado|default:'0' }}">
        <div class="invalid-feedback" id="errorMessagevalor_estimado"></div>
    </div>

    <div class="col-lg-4">
        <label class="form-label small mb-1">Moneda</label>
        <select name="moneda" class="form-select">
            {% for m in monedas %}
                <option value="{{ m }}" {% if card.moneda == m %}selected{% endif %}>{{ m }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="col-lg-12">
        <label class="form-label small mb-1">Cierre esperado</label>
        <input type="date" name="fecha_cierre_esperado" class="form-control"
               value="{% if card.fecha_cierre_esperado %}{{ card.fecha_cierre_esperado|date:'Y-m-d' }}{% endif %}">
    </div>

    <div class="col-lg-12">
        <label class="form-label small mb-1">Observacion</label>
        <textarea name="nota" class="form-control" rows="3" maxlength="1000">{{ card.nota|default:'' }}</textarea>
    </div>
</div>

<div class="border-top my-3"></div>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-danger btn-sm me-1" data-bs-dismiss="modal">
        <i class="fa fa-window-close me-1"></i>Cancelar
    </button>
    <button type="submit" class="btn btn-success btn-sm">
        <i class="fa fa-save me-1"></i>Guardar
    </button>
</div>

{% include 'base_formulario_modal.html' %}
