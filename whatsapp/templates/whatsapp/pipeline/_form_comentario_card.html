<div class="row g-2">
    <input type="hidden" name="pk" value="{{ card.id }}">
    <input type="hidden" name="action" value="add_comentario">
    <input type="hidden" name="card_id" value="{{ card.id }}">

    <div class="col-lg-12">
        <div class="alert alert-light border py-2 mb-2 small">
            <i class="fa fa-flag me-1" style="color:{{ card.etapa.color }}"></i>
            Etapa actual: <strong>{{ card.etapa.nombre }}</strong>
            <span class="text-muted ms-2">El comentario queda vinculado a esta etapa en el historial.</span>
        </div>
    </div>

    <div class="col-lg-12">
        <label class="form-label small mb-1">Comentario / observacion *</label>
        <textarea name="texto" class="form-control" rows="4" maxlength="2000" required
                  placeholder="Anota acciones realizadas, comentarios del cliente, proximos pasos, etc."></textarea>
        <div class="invalid-feedback" id="errorMessagetexto"></div>
    </div>
</div>

<div class="border-top my-3"></div>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-danger btn-sm me-1" data-bs-dismiss="modal">
        <i class="fa fa-window-close me-1"></i>Cancelar
    </button>
    <button type="submit" class="btn btn-success btn-sm">
        <i class="fa fa-paper-plane me-1"></i>Guardar comentario
    </button>
</div>

{% include 'base_formulario_modal.html' %}
