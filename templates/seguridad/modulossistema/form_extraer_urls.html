<div class="row g-2">
    <input type="hidden" name="action" value="extraer_urls">
    <div class="col-12">
        <div class="alert alert-light border mb-2 d-flex justify-content-between align-items-center">
            <div>
                <div class="fw-semibold">URLs nuevas detectadas: {{ total_pendientes }}</div>
                <div class="small text-muted">Marca las URLs que quieres registrar como módulos. Las ya existentes no se muestran.</div>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="check_todas_urls" checked>
                <label class="form-check-label small" for="check_todas_urls">Todas</label>
            </div>
        </div>
    </div>
    <div class="col-12">
        {% for g in grupos_urls %}
            <div class="card mb-2">
                <div class="card-header py-2 d-flex justify-content-between align-items-center">
                    <div class="form-check mb-0">
                        <input class="form-check-input check-app-urls" type="checkbox"
                               id="check_app_{{ forloop.counter }}" checked>
                        <label class="form-check-label fw-semibold" for="check_app_{{ forloop.counter }}">
                            {{ g.app }}
                        </label>
                    </div>
                    <span class="badge bg-info text-dark">{{ g.urls|length }} URL(s)</span>
                </div>
                <div class="card-body py-2">
                    {% for su in g.urls %}
                        <div class="form-check py-1">
                            <input class="form-check-input check-url-item" type="checkbox" name="c_urls"
                                   value="{{ su.url }}" id="url_check_{{ forloop.parentloop.counter }}_{{ forloop.counter }}" checked>
                            <label class="form-check-label" for="url_check_{{ forloop.parentloop.counter }}_{{ forloop.counter }}">
                                {{ su.nombre }}
                                <span class="text-muted small ms-1">{{ su.url }}</span>
                            </label>
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}
    </div>
</div>

<div class="border-top my-3"></div>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-danger btn-sm me-1" data-bs-dismiss="modal">
        <i class="fa fa-window-close me-1"></i>Cancelar
    </button>
    <button type="submit" class="btn btn-success btn-sm">
        <i class="fa fa-file-import me-1"></i>Importar seleccionadas
    </button>
</div>

<script>
    $('.check-app-urls').on('change', function () {
        $(this).closest('.card').find('.check-url-item').prop('checked', this.checked);
        sincronizarCheckTodas();
    });
    $('.check-url-item').on('change', function () {
        var card = $(this).closest('.card');
        var total = card.find('.check-url-item').length;
        var marcados = card.find('.check-url-item:checked').length;
        card.find('.check-app-urls').prop('checked', total === marcados);
        sincronizarCheckTodas();
    });
    $('#check_todas_urls').on('change', function () {
        $('.check-url-item, .check-app-urls').prop('checked', this.checked);
    });
    function sincronizarCheckTodas() {
        var total = $('.check-url-item').length;
        var marcados = $('.check-url-item:checked').length;
        $('#check_todas_urls').prop('checked', total === marcados);
    }
</script>
