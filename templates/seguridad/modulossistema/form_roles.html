<div class="row g-2">
    <input type="hidden" name="action" value="guardar_roles_modulo">
    <input type="hidden" name="pk_modulo" value="{{ modulo.id }}">
    <div class="col-12">
        <div class="alert alert-light border mb-3">
            <div class="small text-muted">Módulo</div>
            <div class="fw-semibold">{{ modulo.nombre }}</div>
            <div class="small text-muted">{{ modulo.url }}</div>
        </div>
    </div>
    <div class="col-12">
        <label class="form-label small mb-2">Selecciona los roles que pueden acceder a esta URL</label>
        <div class="grupos-modulo-list">
            {% for r in roles %}
                <div class="form-check py-1">
                    <input class="form-check-input" type="checkbox" name="c_roles"
                           value="{{ r.id }}" id="rol_check_{{ r.id }}"
                           {% if r.id in roles_actuales_ids %}checked{% endif %}>
                    <label class="form-check-label" for="rol_check_{{ r.id }}">
                        <i class="fa fa-user-shield me-1"></i>
                        {{ r.name }}
                    </label>
                </div>
            {% empty %}
                <div class="text-muted">No hay roles creados. Créalos en Roles de Usuario.</div>
            {% endfor %}
        </div>
        <small class="text-muted">Marcar habilita la URL para el rol (aparece en su sidebar y pasa el control de acceso); desmarcar se la quita.</small>
    </div>
</div>

<div class="border-top my-3"></div>

<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-danger btn-sm me-1" data-bs-dismiss="modal">
        <i class="fa fa-window-close me-1"></i>Cancelar
    </button>
    <button type="submit" class="btn btn-success btn-sm">
        <i class="fa fa-save me-1"></i>Guardar
    </button>
</div>
