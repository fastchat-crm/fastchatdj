{% load templatefunctions %}
<div class="row">
    <input type="hidden" value="{{ filtro.id|encrypt }}" name="pk">
    <input type="hidden" name="action" value="{{ action }}"/>
    {% for field in form %}
        {% if field.is_hidden %}
            {{ field }}
        {% else %}
            <div class="col-lg-{{ field.field.widget.attrs.col }}">
                <div class="form-group">
                    <label class="form-label" for="id_{{ field.name }}">{{ field.label }}:</label><br>
                    {{ field }}
                    <div class="invalid-feedback" id="errorMessage{{ field.name }}"></div>
                </div>
            </div>
        {% endif %}
    {% endfor %}
</div>

<div class="ln_solid"></div>

<div class="form-group">
    <div class="col-md-12 col-sm-12 col-xs-12 col-md-offset-3 text-right">
        <a href="javascript:;" class="btn btn-danger" data-dismiss="modal"><i
                class="fa fa-window-close"></i>
            Cancelar</a>
        <button type="submit"
                class="btn btn-success">
            <i class="fa fa-save"></i> Guardar
        </button>
    </div>
</div>

{{ form.media }}
<script>
    var cantonper = parseInt('{{ filtro.ciudad.id|default_if_none:0 }}');
    $(function () {
        $.fn.select2.defaults.set('language', 'es');
        $('.select2-simple').select2();

        $('.dropify').dropify({
            messages: {
                default: 'Arrastre y suelte un archivo o haga clic aquí.',
                replace: 'Arrastre y suelte un archivo o haga clic aquí.',
                remove: 'Eliminar',
            },
            imgFileExtensions: ["jpg", "jpeg", "png", "tiff", "jfif", "svg"]
        });

        $('#id_provincia').change(function () {
            $('#id_ciudad').empty().append('<option value="">---------</option>').val(0).trigger("change");
            var id = parseInt($("#id_provincia").val());
            if (id > 0) {
                pantallaespera();
                $.ajax({
                    type: "GET",
                    url: "/consultas",
                    data: {'action': 'cantones', 'id': id},
                    success: function (data) {
                        $.unblockUI();
                        if (data.result === 'ok') {
                            estaselec = false;
                            for (elemento in data.lista) {
                                selecc = '';
                                if (estaselec === false) {
                                    idcanton = parseInt(data.lista[elemento][0]);
                                    if (cantonper === idcanton) {
                                        estaselec = true;
                                        selecc = 'selected';
                                    }
                                }
                                $('#id_ciudad').append('<option value="' + data.lista[elemento][0] + '" ' + selecc + '>' + data.lista[elemento][1] + '</option>');
                            }
                            $("#id_ciudad").val(cantonper).trigger("change");
                        } else {
                            $("#id_ciudad").val(0).trigger("change");
                        }
                    },
                    error: function () {
                        $.unblockUI();
                        $("#id_ciudad").val(0).trigger("change");
                        mensajeWarning("Error de conexion.");
                    },
                    dataType: "json"
                });
            }
        });
    })
</script>
