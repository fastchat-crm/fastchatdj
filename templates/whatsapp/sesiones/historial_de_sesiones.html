<table class="table table-hover">
    <tbody>
        {% for l in listado %}
            <tr>
                <td>{{ l.change_message }}</td>
                <td>{{ l.action_time|date:'d/M/Y H:i' }}</td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="2" class="text-center">
                    Sin registros
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
