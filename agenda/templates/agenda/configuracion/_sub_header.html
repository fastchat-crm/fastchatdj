<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <a href="{{ ruta }}" class="btn btn-light btn-sm me-2">
            <i class="fa fa-arrow-left me-1"></i> Volver a grupos
        </a>
        <span class="text-muted small">Grupo:</span>
        <strong>{{ grupo.nombre }}</strong>
        <span class="badge bg-light text-dark ms-1">{{ grupo.moneda }}</span>
    </div>
    <div class="btn-group btn-group-sm" role="group">
        <a href="?action=recursos&grupo_id={{ grupo.pk }}"
           class="btn {% if seccion == 'recursos' %}btn-primary{% else %}btn-outline-primary{% endif %}">
            <i class="fa fa-user-md me-1"></i> Recursos
        </a>
        <a href="?action=servicios&grupo_id={{ grupo.pk }}"
           class="btn {% if seccion == 'servicios' %}btn-primary{% else %}btn-outline-primary{% endif %}">
            <i class="fa fa-concierge-bell me-1"></i> Servicios
        </a>
        <a href="?action=excepciones&grupo_id={{ grupo.pk }}"
           class="btn {% if seccion == 'excepciones' %}btn-primary{% else %}btn-outline-primary{% endif %}">
            <i class="fa fa-ban me-1"></i> Excepciones
        </a>
        <a href="?action=horarios&grupo_id={{ grupo.pk }}"
           class="btn {% if seccion == 'horarios' %}btn-primary{% else %}btn-outline-primary{% endif %}">
            <i class="fa fa-calendar-week me-1"></i> Horarios
        </a>
    </div>
</div>
